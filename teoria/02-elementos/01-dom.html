<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <p id="demo">Parrafo demo</p>

    <script>
        let parrafo = document.getElementById("demo")
        parrafo.innerHTML = "Hola mundo"
    </script>

    <!-- 
        - document: documento HTML entero
        - getElementById(): método de document
        - innerHTML: propiedad de elemento
    -->
    
</body>
</html>
